<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Edit Product</title>
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <h2>Edit Product</h2>

    <form th:action="@{/products/update/{id}(id=${product.id})}" th:object="${product}" method="post" class="form">
        <div class="mb-3">
            <label for="name" class="form-label">Name:</label>
            <input class="form-control" type="text" th:field="*{name}" id="name" placeholder="Product Name">
            <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label for="image" class="form-label">Image URL:</label>
            <input class="form-control" type="text" th:field="*{image}" id="image" placeholder="http://image.jpg">
            <div class="text-danger" th:if="${#fields.hasErrors('image')}" th:errors="*{image}"></div>
        </div>

        <div class="mb-3">
            <label for="price" class="form-label">Price:</label>
            <input class="form-control" type="number" th:field="*{price}" id="price" placeholder="Price">
            <div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>

        <div class="mb-3">
            <label for="category" class="form-label">Category:</label>
            <!-- FIX lỗi category_id null: bind vào category.id -->
            <select th:field="*{category.id}" class="form-select" id="category">
                <option value="" disabled selected>-- Choose category --</option>
                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:text="${category.name}">
                </option>
            </select>
            <div class="text-danger" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
        </div>

        <button type="submit" class="btn btn-success">Edit Product</button>
        <a th:href="@{/products}" class="btn btn-secondary">Back</a>
    </form>
</div>
</body>
</html>

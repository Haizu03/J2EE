<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Sửa sản phẩm</h2>

<form th:action="@{/products/update/{id}(id=${product.id})}" th:object="${product}" method="post">
    <div class="mb-3">
        <label class="form-label">Tên sản phẩm</label>
        <input type="text" th:field="*{name}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Link ảnh</label>
        <input type="text" th:field="*{image}" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Giá</label>
        <input type="number" step="0.01" th:field="*{price}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Danh mục</label>
        <select th:field="*{category}" class="form-select">
            <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
        </select>
    </div>

    <button type="submit" class="btn btn-success">Cập nhật</button>
    <a th:href="@{/products}" class="btn btn-secondary">Quay lại</a>
</form>

</body>
</html>

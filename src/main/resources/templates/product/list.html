<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<body>
<div layout:fragment="content" class="container body-content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Products</h2>
        <a th:href="@{/products/add}" class="btn btn-primary">Create New Product</a>
    </div>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>#</th>
            <th>Name</th>
            <th>Image</th>
            <th>Price</th>
            <th>Category</th>
            <th style="width: 180px;">Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <th scope="row" th:text="${product.id}"></th>
            <td th:text="${product.name}"></td>
            <td>
                <img th:if="${product.image != null and !#strings.isEmpty(product.image)}"
                     th:src="${product.image}" alt="Product Image" width="150" height="120">
            </td>
            <td th:text="${product.price}"></td>
            <td th:text="${product.category != null ? product.category.name : ''}"></td>
            <td>
                <a class="btn btn-secondary btn-sm"
                   th:href="@{/products/edit/{id}(id=${product.id})}">Edit</a>

                <form th:action="@{/products/delete/{id}(id=${product.id})}"
                      method="post" style="display:inline;">
                    <button type="submit" class="btn btn-danger btn-sm"
                            onclick="return confirm('Delete this product?')">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Danh sách sản phẩm</h2>
    <div>
        Xin chào, <b sec:authentication="name"></b>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" class="btn btn-secondary btn-sm">Đăng xuất</button>
        </form>
    </div>
</div>

<div class="mb-3">
    <a th:href="@{/categories}" class="btn btn-info">Danh mục</a>
    <a sec:authorize="hasRole('ADMIN')" th:href="@{/products/add}" class="btn btn-primary">Thêm sản phẩm</a>
</div>

<table class="table table-bordered table-striped">
    <thead>
    <tr>
        <th>ID</th>
        <th>Tên sản phẩm</th>
        <th>Ảnh</th>
        <th>Giá</th>
        <th>Danh mục</th>
        <th sec:authorize="hasRole('ADMIN')">Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="product : ${products}">
        <td th:text="${product.id}"></td>
        <td th:text="${product.name}"></td>
        <td>
            <img th:if="${product.image != null and !#strings.isEmpty(product.image)}"
                 th:src="${product.image}"
                 width="80">
        </td>
        <td th:text="${product.price}"></td>
        <td th:text="${product.category != null ? product.category.name : ''}"></td>
        <td sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-warning btn-sm">Sửa</a>
            <a th:href="@{/products/delete/{id}(id=${product.id})}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('Bạn có chắc muốn xóa?')">Xóa</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>

<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Danh sách danh mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Danh sách danh mục</h2>
    <div>
        Xin chào, <b sec:authentication="name"></b>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" class="btn btn-secondary btn-sm">Đăng xuất</button>
        </form>
    </div>
</div>

<div class="mb-3">
    <a th:href="@{/products}" class="btn btn-info">Sản phẩm</a>
    <a sec:authorize="hasRole('ADMIN')" th:href="@{/categories/add}" class="btn btn-primary">Thêm danh mục</a>
</div>

<table class="table table-bordered table-striped">
    <thead>
    <tr>
        <th>ID</th>
        <th>Tên danh mục</th>
        <th sec:authorize="hasRole('ADMIN')">Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="category : ${categories}">
        <td th:text="${category.id}"></td>
        <td th:text="${category.name}"></td>
        <td sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn btn-warning btn-sm">Sửa</a>
            <a th:href="@{/categories/delete/{id}(id=${category.id})}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('Bạn có chắc muốn xóa?')">Xóa</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
